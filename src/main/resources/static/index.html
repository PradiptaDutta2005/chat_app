<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
</head>
<body>

<h2>Chat App</h2>

<!-- 🔐 LOGIN -->
<input id="name" placeholder="Username"/>
<input id="password" placeholder="Password" type="password"/>
<button onclick="login()">Login</button>

<br><br>

<!-- CHAT -->
<input id="receiver" placeholder="Receiver" oninput="loadHistory()"/>
<input id="message" placeholder="Message"/>
<button onclick="sendMessage()">Send</button>

<ul id="chat"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let username = "";
    let token = "";

    // 🔐 LOGIN FUNCTION
    function login() {

        username = document.getElementById("name").value;
        let password = document.getElementById("password").value;

        if (!username || !password) {
            alert("Enter username and password");
            return;
        }

        fetch("/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        })
        .then(res => res.text())
        .then(data => {

            token = data;   // 🔥 store JWT
            console.log("JWT:", token);

            alert("Login successful!");

            connect();  // 🔥 connect after login
        })
        .catch(() => alert("Login failed"));
    }

    // 🔌 CONNECT
    function connect() {

        let socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            console.log("✅ CONNECTED as " + username);

            loadHistory();

            stompClient.subscribe('/topic/messages', function (msg) {

                let message = JSON.parse(msg.body);

                if (
                    message.sender === username ||
                    message.receiver === username
                ) {
                    let li = document.createElement("li");
                    li.textContent = message.sender + ": " + message.content;
                    document.getElementById("chat").appendChild(li);
                }
            });
        });
    }

    // 📤 SEND MESSAGE
    function sendMessage() {

        if (!stompClient) {
            alert("Not connected!");
            return;
        }

        let receiver = document.getElementById("receiver").value;

        if (!receiver) {
            alert("Enter receiver!");
            return;
        }

        let msg = {
            sender: username,
            receiver: receiver,
            content: document.getElementById("message").value
        };

        stompClient.send("/app/private-message", {}, JSON.stringify(msg));

        let li = document.createElement("li");
        li.textContent = "You: " + msg.content;
        document.getElementById("chat").appendChild(li);

        document.getElementById("message").value = "";

        loadHistory();
    }

    // 📜 LOAD HISTORY
    function loadHistory() {

        let receiver = document.getElementById("receiver").value;

        if (!receiver) return;

        fetch(`/messages?user1=${username}&user2=${receiver}`, {
            headers: {
                "Authorization": "Bearer " + token   // 🔥 attach JWT
            }
        })
        .then(res => res.json())
        .then(data => {

            document.getElementById("chat").innerHTML = "";

            data.forEach(msg => {
                let li = document.createElement("li");
                li.textContent = msg.sender + ": " + msg.content;
                document.getElementById("chat").appendChild(li);
            });
        });
    }
</script>

</body>
</html>
